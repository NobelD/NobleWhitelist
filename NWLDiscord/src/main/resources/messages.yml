placeholders:
  optional-none: "Invalid Player!"
  optional-name: "**Player name:** `<name>`"
  optional-uuid: "**Player uuid:** <uuid>"
  optional-id: "**User ID:** <user_id>"
  player-data: "<row> **-** `<name>` **-** <uuid> **-** <user_id>"
  account-entry: "<player_data>"
  list-entry: "<player_data>"
  toggled-true: true
  toggled-false: false
  status-enabled: "enabled"
  status-disabled: "disabled"
  checking-disabled: "disabled"
  checking-optional: "optional"
  checking-required: "required"
discord:
  channel:
    start:
      type: message
      content: ":sparkle: Server is now open!"
    stop:
      type: message
      content: ":octagonal_sign: Server is now closed!"
    notify-self-register:
      type: embed
      body:
        color: 88FF8A
        content: |-
          The user <user_mention> has issued a command and it has been added to the whitelist.
          
          <player_optional>
    notify-self-remove:
      type: embed
      body:
        color: FFC288
        content: |-
          The user <user_mention> has issued a command and it has been removed from the whitelist.
          
          **Player name:** `<name>`
          **Player uuid:** <uuid>
          **User ID:** <user_id>
    notify-role-add:
      type: embed
      body:
        color: 88D7FF
        content: |-
          The user <user_mention> got the whitelist roles added.
    notify-role-remove:
      type: embed
      body:
        color: FFA287
        content: |-
          The user <user_mention> got the whitelist roles removed.
    notify-wl-join:
      type: embed
      body:
        color: 88D7FF
        content: |-
          A player was allowed to join the server:
          
          **Player name:** `<name>`
          **Player uuid:** <uuid>
    notify-wl-try:
      type: embed
      body:
        color: FFA287
        content: |-
          A player was denied to join the server:
          
          **Player name:** `<name>`
          **Player uuid:** <uuid>
    notify-wl-auto:
      type: embed
      body:
        color: 88D7FF
        content: |-
          A player has been automatically added to the whitelist:
          
          **Player name:** `<name>`
          **Player uuid:** <uuid>
  error:
    no-permission:
      type: message
      ephemeral: true
      content: You are not allowed to execute this command.
    invalid-channel:
      type: message
      ephemeral: true
      content: You are not allowed to execute this command on this channel.
    invalid-guild:
      type: message
      ephemeral: true
      content: You are not allowed to execute this command on this guild or it is an invalid guild.
    invalid-member:
      type: message
      ephemeral: true
      content: |-
        This command can only be executed by valid users.
        Try executing the command again, if this still fails, notify an administrator.
    user-self-already:
      type: message
      ephemeral: true
      content: You're already present in the whitelist.
    user-already:
      type: message
      ephemeral: true
      content: This user is already present in the whitelist.
    user-not-found:
      type: message
      ephemeral: true
      content: No player was found.
    no-inputted-data:
      type: message
      ephemeral: true
      content: You need to provide at least 1 argument to execute this command.
    insufficient-data:
      type: message
      ephemeral: true
      content: You need to input the necessary arguments to use this command.
    invalid-uuid:
      type: message
      ephemeral: true
      content: The provided uuid is invalid.
    invalid-interaction:
      type: message
      ephemeral: true
      content: The interaction was invalid.
    self-no-accounts:
      type: message
      ephemeral: true
      content: You are not present in the whitelist.
    self-no-more-accounts:
      type: message
      ephemeral: true
      content: You cannot register more accounts to the whitelist.
    user-no-accounts:
      type: message
      ephemeral: true
      content: This user is not present in the whitelist.
    already-self-linked:
      type: message
      ephemeral: true
      content: Your account is already linked to a whitelist entry!
    already-user-linked:
      type: message
      ephemeral: true
      content: This user is already linked to a whitelist entry, unlink it before trying to link it to another entry.
    already-toggled:
      type: message
      ephemeral: true
      content: "Nothing changed, the user join status was already: <toggle>"
    whitelist-empty:
      type: message
      ephemeral: true
      content: "The whitelist is empty."
    whitelist-page-empty:
      type: message
      ephemeral: true
      content: "This page is empty."
  command:
    self-accounts:
      type: embed
      body:
        color: AFFF5A
        content: |-
          List of your registered accounts:
          
          <account_entry>
    user-accounts:
      type: embed
      body:
        color: AFFF5A
        content: |-
          List of the user accounts:
          
          <account_entry>
    add-user:
      type: embed
      body:
        color: AFFF5A
        content: |-
          The user was successfully added to the whitelist.
          
          Account info:
          <player_optional>
    self-add:
      type: embed
      body:
        color: AFFF5A
        content: |-
          You were added to the whitelist.
          
          Account info:
          <player_optional>
    remove-user:
      type: embed
      body:
        color: FF685E
        content: |-
          The user was successfully removed from the whitelist.
          
          Account info:
          <player_optional>
    self-remove:
      type: embed
      body:
        color: FF685E
        content: |-
          You were removed from the whitelist.
          
          Account info:
          <player_optional>
    whitelist-off:
      type: embed
      body:
        color: FF685E
        content: |-
          The whitelist was disabled.
    already-off:
      type: embed
      body:
        color: FF685E
        content: |-
          Nothing changed, the whitelist was already disabled.
    whitelist-on:
      type: embed
      body:
        color: AFFF5A
        content: |-
          The whitelist was enabled.
    already-on:
      type: embed
      body:
        color: AFFF5A
        content: |-
          Nothing changed, the whitelist was already enabled.
    list-page:
      type: embed
      ephemeral: true
      body:
        color: 77FFF7
        content: |-
          List of whitelist entries: [Page: <page>]
          
          <list_entry>
    perm-status:
      type: embed
      ephemeral: true
      body:
        color: 77FFF7
        content: |-
          Permission status:
          Only Operator: <only_op>
          Permission Limit: <perm_min>
    perm-set:
      type: embed
      ephemeral: true
      body:
        color: 77FFF7
        content: |-
          Permission limit was set to: <perm_min>
    checking-status:
      type: embed
      ephemeral: true
      body:
        color: 77FFF7
        content: |-
          Checking status:
          
          Name: <checking_name>
          UUID: <checking_uuid>
          Perm: <checking_perm>
    checking-set:
      type: embed
      ephemeral: true
      body:
        color: 77FFF7
        content: |-
          The checking status of <type> was changed to <option>.
    find-user:
      type: embed
      body:
        color: FF72AC
        content: |-
          A player was found with the following information:
          
          **Player name:** `<name>`
          **Player uuid:** <uuid>
          **User ID:** <user_id>
          **Can Join:** <toggle>
    self-link:
      type: embed
      body:
        color: FF72AC
        content: |-
          You have linked this account to you:
          
          <player_optional>
    user-link:
      type: embed
      body:
        color: FF72AC
        content: |-
          This user is now linked to an account.
          
          <player_optional>
    user-unlink:
      type: embed
      body:
        color: FF72AC
        content: |-
          This user was unlinked.
          
          <player_optional>
    user-toggled:
      type: embed
      body:
        color: FF72AC
        content: |-
          The player join status was changed to: <toggle>
          
          <player_optional>